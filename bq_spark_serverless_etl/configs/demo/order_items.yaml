# Demo config: order_items (incremental / append with watermark)
#
# Demonstrates: incremental extraction using a high-watermark column.
# On the first run, all rows are extracted. On subsequent runs, only rows
# where created_at > last_watermark are extracted and appended.
#
# The watermark is stored in BigQuery: raw_thelook._watermarks
#
# GCS path (after make deploy): gs://<bucket>/configs/thelook/public/order_items.yaml

source:
  type: postgres
  # Secret Manager resource name -- populated by infra/setup.sh
  jdbc_url_secret: projects/MY_PROJECT/secrets/thelook-db-jdbc-url/versions/latest
  table: public.order_items
  fetch_size: 10000

target:
  project: MY_PROJECT
  dataset: raw_thelook
  table: order_items
  write_mode: append
  partition_field: created_at
  clustering_fields:
    - status
    - product_id

extraction:
  mode: incremental
  watermark_column: created_at
