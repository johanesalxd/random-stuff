# Demo config: orders (full load / overwrite)
#
# Demonstrates: full extraction from Cloud SQL Postgres -> BigQuery.
# On every run, the target table is fully replaced.
#
# GCS path (after make deploy): gs://<bucket>/configs/thelook/public/orders.yaml

source:
  type: postgres
  # Secret Manager resource name -- populated by infra/setup.sh
  jdbc_url_secret: projects/MY_PROJECT/secrets/thelook-db-jdbc-url/versions/latest
  table: public.orders
  fetch_size: 10000

target:
  project: MY_PROJECT
  dataset: raw_thelook
  table: orders
  write_mode: overwrite
  partition_field: created_at
  clustering_fields:
    - status
    - gender

extraction:
  mode: full
