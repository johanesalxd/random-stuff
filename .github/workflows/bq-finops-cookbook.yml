name: BigQuery FinOps Cookbook

on:
  pull_request:
    paths:
      - "bq_finops_cookbook/**"
      - ".github/workflows/bq-finops-cookbook.yml"
  push:
    branches: [main]
    paths:
      - "bq_finops_cookbook/**"
      - ".github/workflows/bq-finops-cookbook.yml"

permissions:
  contents: read

jobs:
  offline-contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bq_finops_cookbook
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python
        run: python -m compileall -q scripts tests
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate cookbook contracts
        run: python scripts/validate_cookbook.py all
      - name: Verify inventory
        run: python scripts/validate_cookbook.py inventory
